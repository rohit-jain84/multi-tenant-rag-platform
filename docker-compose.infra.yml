services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragplatform
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragplatform"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 1g

  redis:
    image: redis:7-alpine
    ports:
      - "6387:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6337:6333"
      - "6338:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 1g

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
